name: Release All Platforms

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. 1.12.1)
        required: true
      gitee_repo:
        description: Gitee source URL (no credentials)
        required: false
        default: https://gitee.com/psvmc/z-ssh-tools-wails.git

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-24.04
            platform: linux
          - os: macos-latest
            platform: macos

    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone from Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ inputs.gitee_repo }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${GITEE_TOKEN:-}" ]; then
            echo "::error::Set secret GITEE_TOKEN on this repository (Gitee private token, scope: projects)"
            exit 1
          fi
          REPO_PATH="${GITEE_REPO#https://}"
          AUTH_URL="https://oauth2:${GITEE_TOKEN}@${REPO_PATH}"

          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          TAG_CANDIDATES=("$RELEASE_TAG")
          if [[ "$RELEASE_TAG" == v* ]]; then
            TAG_CANDIDATES+=("${RELEASE_TAG#v}")
          else
            TAG_CANDIDATES+=("v${RELEASE_TAG}")
          fi

          clone_ok=false
          for TAG in "${TAG_CANDIDATES[@]}"; do
            for attempt in 1 2 3; do
              echo "Cloning tag ${TAG} (attempt ${attempt})..."
              rm -rf repo
              if git clone --depth 1 --branch "$TAG" "$AUTH_URL" repo; then
                echo "Cloned tag ${TAG}"
                clone_ok=true
                break 2
              fi
              sleep $((attempt * 5))
            done
          done

          if [ "$clone_ok" != true ]; then
            echo "::error::Failed to clone tag ${RELEASE_TAG} from Gitee. Push the tag first: git tag ${RELEASE_TAG#v} && git push origin ${RELEASE_TAG#v}"
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: repo/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: repo/frontend/package-lock.json

      - name: Install NSIS (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev pkg-config build-essential

      - name: Build
        working-directory: repo
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

          # 嵌入资源不在 git 中；先清 Go 缓存，避免 embed 仍引用旧 dist 文件名
          go clean -cache

          cd frontend && npm ci && cd ..

          echo "Generating Wails bindings..."
          wails3 generate bindings -f "-tags production" -d bindings_staging -clean=true
          rm -rf frontend/bindings
          cp -r bindings_staging frontend/bindings
          rm -rf bindings_staging

          echo "Building embedded frontend assets..."
          rm -rf backend/internal/assets/dist
          PRODUCTION=true npm run build --prefix frontend
          if [ -z "$(find backend/internal/assets/dist -type f 2>/dev/null | head -n 1)" ]; then
            echo "::error::backend/internal/assets/dist is empty after frontend build"
            exit 1
          fi
          find backend/internal/assets/dist -type f | head -20

          mkdir -p release

          if [ "${{ matrix.platform }}" = "windows" ]; then
            if command -v makensis >/dev/null 2>&1; then
              wails3 task windows:package
              cp -f dist/*-installer.exe release/ 2>/dev/null || true
            else
              echo "NSIS not found, building exe only"
              wails3 task windows:build
            fi
            cp -f dist/windows-amd64/ZLink.exe release/ZLink-windows-amd64.exe
          elif [ "${{ matrix.platform }}" = "linux" ]; then
            mkdir -p build && cp icons/icon.png build/appicon.png
            if wails3 task linux:create:deb; then
              cp -f bin/*.deb release/ 2>/dev/null || true
            else
              wails3 task linux:build
              cp -f bin/ZLink release/ZLink-linux-amd64
            fi
          else
            wails3 task darwin:package:universal
            ditto -c -k --keepParent bin/ZLink.app release/ZLink-macos-universal.zip
          fi
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: repo/release/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate changelog from git tags
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ inputs.gitee_repo }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          GITEE_TOKEN="$(printf '%s' "${GITEE_TOKEN}" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "${GITEE_TOKEN}" ]; then
            echo "::error::GITEE_TOKEN is empty."
            exit 1
          fi
          REPO_PATH="${GITEE_REPO#https://}"
          REPO_PATH="${REPO_PATH#http://}"
          CLONE_URL="https://${REPO_PATH}"

          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          clone_for_changelog() {
            GIT_TERMINAL_PROMPT=0 git -c credential.helper= \
              -c "credential.helper=!f() { echo username=oauth2; echo password=${GITEE_TOKEN}; }; f" \
              "$@"
          }

          clone_ok=false
          last_err=""
          for attempt in 1 2 3; do
            echo "Cloning for changelog (attempt ${attempt})..."
            rm -rf repo
            set +e
            err=$(
              clone_for_changelog -c protocol.version=2 \
                clone --filter=blob:none --tags --no-checkout "$CLONE_URL" repo 2>&1
            )
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              echo "Cloned for changelog (partial)"
              clone_ok=true
              break
            fi
            last_err="$err"
            echo "$err"
            sleep $((attempt * 5))
          done

          if [ "$clone_ok" != true ]; then
            echo "Partial clone failed, trying full clone..."
            rm -rf repo
            set +e
            err=$(
              clone_for_changelog clone --tags --no-checkout "$CLONE_URL" repo 2>&1
            )
            code=$?
            set -e
            if [ "$code" -eq 0 ]; then
              echo "Cloned for changelog (full)"
              clone_ok=true
            else
              last_err="$err"
            fi
          fi

          if [ "$clone_ok" != true ]; then
            echo "::error::Failed to clone for changelog."
            if [ -n "$last_err" ]; then
              echo "::error::Git said: ${last_err}"
            fi
            exit 1
          fi

          cd repo

          resolve_tag() {
            local tag="$1"
            for candidate in "$tag" "${tag#v}" "v${tag#v}"; do
              if git rev-parse "refs/tags/${candidate}" >/dev/null 2>&1; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          CURRENT_TAG="$(resolve_tag "$RELEASE_TAG")" || {
            echo "::error::Tag ${RELEASE_TAG} not found on Gitee."
            exit 1
          }

          PREV_TAG="$(git tag -l --sort=-version:refname | awk -v cur="$CURRENT_TAG" '$0==cur {getline; print; exit}')"
          if [ -z "$PREV_TAG" ]; then
            RANGE="$CURRENT_TAG"
            HEADER="## 变更 (${CURRENT_TAG})"
            LOG="- 首个发布版本"
          else
            RANGE="${PREV_TAG}..${CURRENT_TAG}"
            HEADER="## 变更 (${PREV_TAG} → ${CURRENT_TAG})"
            LOG=$(git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges)
            if [ -z "$LOG" ]; then
              LOG="- 无 commit 变更（可能仅有 tag 移动）"
            fi
          fi

          {
            printf '%s\n\n' "$HEADER"
            printf '%s\n' "$LOG"
          } > "$GITHUB_WORKSPACE/release-notes.md"
          echo "Changelog for ${RANGE}:"
          cat "$GITHUB_WORKSPACE/release-notes.md"

      - name: Verify release notes
        run: test -s release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f -ls

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          target_commitish: main
          name: ZLink ${{ inputs.tag }}
          body_path: release-notes.md
          files: dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
